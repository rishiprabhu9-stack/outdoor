<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Outdoor Trip Planner</title>

<style>
:root {
  --bg: #ffffff;
  --text: #222;
  --card: #f4f4f4;
}

body.dark {
  --bg: #121212;
  --text: #f4f4f4;
  --card: #1e1e1e;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  transition: 0.3s;
}

header {
  padding: 1rem;
  display: flex;
  justify-content: space-between;
  background: #2c7a7b;
  color: white;
}

button {
  margin-left: 10px;
  padding: 5px 10px;
  cursor: pointer;
}

.hero {
  padding: 2rem;
  text-align: center;
}

.card {
  background: var(--card);
  padding: 1rem;
  margin: 1rem;
  border-radius: 10px;
}

.container {
  max-width: 900px;
  margin: auto;
}

.checklist li {
  cursor: pointer;
}

.checked {
  text-decoration: line-through;
  opacity: 0.6;
}
</style>
</head>

<body>

<header>
  <h2 id="title">Outdoor Trip Planner</h2>
  <div>
    <button onclick="toggleTheme()">🌙</button>
    <button onclick="toggleLang()">🌍</button>
  </div>
</header>

<div class="hero">
  <h1 id="headline">Plan Your Perfect Adventure</h1>
  <p id="subtext">Guides, gear, and checklists for your next outdoor trip.</p>
</div>

<div class="container">

  <div class="card">
    <h3 id="checklistTitle">Camping Checklist</h3>
    <ul class="checklist" id="list">
      <li onclick="toggleCheck(this)">Tent</li>
      <li onclick="toggleCheck(this)">Sleeping Bag</li>
      <li onclick="toggleCheck(this)">Flashlight</li>
      <li onclick="toggleCheck(this)">Food & Water</li>
    </ul>
  </div>

  <div class="card">
    <h3 id="guideTitle">Featured Guide</h3>
    <p id="guideText">Explore one of the best fishing and camping destinations in the region.</p>
  </div>

</div>

<script>
let dark = false;
function toggleTheme() {
  document.body.classList.toggle("dark");
}

function toggleCheck(el) {
  el.classList.toggle("checked");
}

let lang = "en";
function toggleLang() {
  if (lang === "en") {
    document.getElementById("title").innerText = "Planificador de Aventuras";
    document.getElementById("headline").innerText = "Planea tu aventura perfecta";
    document.getElementById("subtext").innerText = "Guías, equipo y listas para tu viaje.";
    document.getElementById("checklistTitle").innerText = "Lista de Camping";
    document.getElementById("guideTitle").innerText = "Guía Destacada";
    document.getElementById("guideText").innerText = "Explora uno de los mejores destinos de pesca y camping.";
    lang = "es";
  } else {
    location.reload();
  }
}
</script>

</body>
</html>
