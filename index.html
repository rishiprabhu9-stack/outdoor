<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Outdoor Adventures</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>

<style>
/* KEEP YOUR ORIGINAL STYLES (trimmed slightly for space) */
body { font-family: 'DM Sans', sans-serif; margin:0; }

/* Cards */
.cards-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(300px,1fr)); gap:1.5rem; }
.card { border-radius:20px; overflow:hidden; cursor:pointer; box-shadow:0 6px 24px rgba(0,0,0,0.1); transition:0.3s; }
.card:hover { transform:translateY(-6px); }
.card-img { width:100%; height:220px; object-fit:cover; }
.card-body { padding:1.2rem; }

/* Modal */
.modal {
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  z-index:999;
  justify-content:center;
  align-items:center;
}

.modal-content {
  background:#fff;
  width:90%;
  max-width:700px;
  border-radius:16px;
  padding:2rem;
  max-height:80vh;
  overflow:auto;
}

.close-btn {
  float:right;
  font-size:1.6rem;
  cursor:pointer;
}

/* Activities list */
.activity-item {
  border-bottom:1px solid #ddd;
  padding:1rem 0;
}

.activity-title { font-weight:600; }
.activity-meta { font-size:0.85rem; color:#666; }

.filter-bar { margin:1rem 0; }

button.book-btn {
  margin-top:8px;
  padding:6px 14px;
  border:none;
  border-radius:20px;
  background:#2d5a27;
  color:#fff;
  cursor:pointer;
}
</style>
</head>

<body>

<section style="padding:4rem 2rem;">
<h2>Popular Adventures</h2>

<div class="cards-grid">

<div class="card" onclick="openActivity('hiking')">
<img class="card-img" src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?w=700&q=80">
<div class="card-body">
<h3>Mountain Trails</h3>
<p>Explore scenic hiking routes.</p>
</div>
</div>

<div class="card" onclick="openActivity('kayaking')">
<img class="card-img" src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=700&q=80">
<div class="card-body">
<h3>Kayaking</h3>
<p>Peaceful rivers & lakes.</p>
</div>
</div>

<div class="card" onclick="openActivity('camping')">
<img class="card-img" src="https://images.unsplash.com/photo-1499696010180-025ef6e1a8f9?w=700&q=80">
<div class="card-body">
<h3>Camping</h3>
<p>Sleep under the stars.</p>
</div>
</div>

</div>
</section>

<!-- MODAL -->
<div id="activityModal" class="modal">
  <div class="modal-content">
    <span class="close-btn" onclick="closeActivity()">&times;</span>

    <h2 id="modalTitle">Adventures</h2>

    <div class="filter-bar">
      <label>
        <input type="checkbox" id="asapFilter" onchange="renderActivities()">
        ⚡ Book ASAP
      </label>
    </div>

    <div id="activityList"></div>
  </div>
</div>

<script>
const activitiesData = {
  hiking: [
    { name:"Rocky Mountain Trail", time:"asap" },
    { name:"Bear Lake Loop", time:"flexible" },
    { name:"Alpine Summit Route", time:"asap" }
  ],
  kayaking: [
    { name:"Crystal Lake Paddle", time:"flexible" },
    { name:"Rapid River Run", time:"asap" }
  ],
  camping: [
    { name:"Starlight Camp", time:"asap" },
    { name:"Hidden Forest Site", time:"flexible" }
  ]
};

let currentActivity = null;

function openActivity(type){
  currentActivity = type;
  document.getElementById("activityModal").style.display="flex";
  document.getElementById("modalTitle").textContent = type.toUpperCase();
  renderActivities();
}

function closeActivity(){
  document.getElementById("activityModal").style.display="none";
}

function renderActivities(){
  const list = document.getElementById("activityList");
  const asapOnly = document.getElementById("asapFilter").checked;

  let items = activitiesData[currentActivity];

  if(asapOnly){
    items = items.filter(i => i.time === "asap");
  }

  list.innerHTML = items.map(i => `
    <div class="activity-item">
      <div class="activity-title">${i.name}</div>
      <div class="activity-meta">
        ${i.time === "asap" ? "⚡ Book ASAP" : "Flexible booking"}
      </div>
      <button class="book-btn">Book Now</button>
    </div>
  `).join("");
}
</script>

</body>
</html>
